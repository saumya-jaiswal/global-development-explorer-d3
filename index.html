        // wrap in function to keep same structure as original d3.csv approach
        function processData(data) {

            // ensure number types are correct
            data.forEach(function(d) {
                d.iwi_score       = +d.iwi_score;
                d.secondary_enrol = +d.secondary_enrol;
                d.population      = +d.population;
                d.year            = +d.year;
            });

            // scales: x and y are linear
            const xScale = d3.scaleLinear()
                .domain([0, 100])
                .range([0, width]);

            const yScale = d3.scaleLinear()
                .domain([0, 100])
                .range([height, 0]);

            // scaleSqrt ensures bubble area is proportional to population
            const radiusScale = d3.scaleSqrt()
                .domain([0, d3.max(data, d => d.population)])
                .range([3, 40]);

            // drawn axes and labels only once, since they don't change with year
            // X axis
            svg.append("g")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(xScale));

            // X axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("x", width / 2)
                .attr("y", height + 45)
                .attr("text-anchor", "middle")
                .text("IWI Wealth Score (0–100)");

            // Y axis
            svg.append("g")
                .call(d3.axisLeft(yScale));

            // Y axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", -50)
                .attr("text-anchor", "middle")
                .text("Secondary School Enrolment (%)");

            // data source 
            svg.append("text")
                .attr("x", width / 2)
                .attr("y", height + 65)
                .attr("text-anchor", "middle")
                .attr("font-size", "10px")
                .attr("fill", "#999")
                .text("Sources: Global Data Lab (IWI), World Bank (Education, Population)");

            // legend for continent colours and bubble size
            const continents = ["Africa", "America", "Asia & Pacific", "Europe"];

            const legend = svg.append("g")
                .attr("transform", `translate(${width + 20}, 20)`);

            // legend title — Continent
            legend.append("text")
                .attr("x", 0)
                .attr("y", 0)
                .attr("font-size", "13px")
                .attr("font-weight", "bold")
                .attr("fill", "#333")
                .text("Continent");

            // one circle + label per continent
            continents.forEach(function(continent, i) {
                legend.append("circle")
                    .attr("cx", 8)
                    .attr("cy", 20 + i * 25)
                    .attr("r", 7)
                    .attr("fill", colourByContinent(continent))
                    .attr("opacity", 0.8);

                legend.append("text")
                    .attr("x", 22)
                    .attr("y", 25 + i * 25)
                    .attr("font-size", "12px")
                    .attr("fill", "#444")
                    .text(continent);
            });

            // Bubble size legend
            legend.append("text")
                .attr("x", 0)
                .attr("y", 140)
                .attr("font-size", "13px")
                .attr("font-weight", "bold")
                .attr("fill", "#333")
                .text("Bubble size");

            legend.append("text")
                .attr("x", 0)
                .attr("y", 158)
                .attr("font-size", "11px")
                .attr("fill", "#666")
                .text("= Population");

            // tooltip div for adding interactivity
            const tooltip = d3.select("#tooltip");

            // initial year 2000
            updateChart(2000);

            // slider event listener — updates chart when year changes
            d3.select("#yearSlider").on("input", function() {
                const selectedYear = +this.value;
                d3.select("#year-label").text(selectedYear);
                updateChart(selectedYear);
            });

            // continent filter event listener — updates chart when continent selection changes
            d3.selectAll(".continent-filter").on("change", function() {
                updateChart(+d3.select("#yearSlider").property("value"));
            });

            // update function to redraw circles based on selected year and active continent filters
            function updateChart(selectedYear) {

                // Get currently checked continents
                const activeContinents = [];
                document.querySelectorAll(".continent-filter:checked").forEach(function(cb) {
                    activeContinents.push(cb.value);
                });

                // Filter data to selected year AND active continents
                const yearData = data.filter(d =>
                    d.year === selectedYear &&
                    activeContinents.includes(d.continent)
                );

                // JOIN data to circles (key by country name)
                const circles = svg.selectAll("circle.bubble")
                    .data(yearData, d => d.country);

                // ENTER new circles
                circles.enter()
                    .append("circle")
                    .attr("class", "bubble")
                    .attr("cx", d => xScale(d.iwi_score))
                    .attr("cy", d => yScale(d.secondary_enrol))
                    .attr("r", 0)
                    .attr("fill", d => colourByContinent(d.continent))
                    .attr("opacity", 0.7)
                    .attr("stroke", "white")
                    .attr("stroke-width", 0.5)
                    // tooltip on mouseover
                    .on("mouseover", function(event, d) {
                        tooltip
                            .style("opacity", 1)
                            .html(`
                                <strong>${d.country}</strong><br>
                                <hr style="margin:4px 0">
                                Wealth (IWI): ${d.iwi_score}<br>
                                Education: ${d.secondary_enrol}%<br>
                                Population: ${(d.population / 1e6).toFixed(1)}M<br>
                                Region: ${d.continent}<br>
                                Income: ${d.income_group}
                            `)
                            .style("left", (event.pageX + 15) + "px")
                            .style("top", (event.pageY - 30) + "px");
                    })
                    .on("mouseout", function() {
                        tooltip.style("opacity", 0);
                    })
                    // MERGE enter + update selections
                    .merge(circles)
                    .transition()
                    .duration(500)
                    .attr("cx", d => xScale(d.iwi_score))
                    .attr("cy", d => yScale(d.secondary_enrol))
                    .attr("r", d => radiusScale(d.population));

                // EXIT — smoothly shrink removed circles
                circles.exit()
                    .transition()
                    .duration(300)
                    .attr("r", 0)
                    .remove();
                // update country count display
                document.getElementById("count-number").textContent = yearData.length;    
            }
        }
        processData(embeddedData);
    </script>
